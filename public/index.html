<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRI Labs — Brand Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#F8FAFC;--card:#FFFFFF;--card-2:#F1F5F9;
      --border:#E2E8F0;--border-2:#CBD5E1;
      --t0:#0F172A;--t1:#334155;--t2:#64748B;--t3:#94A3B8;
      --accent:#6366F1;--accent-2:#818CF8;--accent-bg:rgba(99,102,241,.06);
      --pos:#059669;--pos-bg:#ECFDF5;--pos-border:#A7F3D0;
      --neg:#DC2626;--neg-bg:#FEF2F2;--neg-border:#FECACA;
      --neu:#D97706;--neu-bg:#FFFBEB;--neu-border:#FDE68A;
      --r:12px;--r-sm:8px;--r-full:9999px;
      --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
      --shadow-md:0 4px 12px rgba(0,0,0,.08);
    }
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t0);font-size:13px;line-height:1.5;min-height:100vh}

    /* TOPBAR */
    .topbar{height:56px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100}
    .tb-logo{display:flex;align-items:center;gap:10px;margin-right:28px}
    .tb-logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),#7C3AED);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;color:#fff}
    .tb-logo-text{font-size:14px;font-weight:700;color:var(--t0)}
    .tb-badge{font-size:9px;font-weight:700;color:var(--accent);background:var(--accent-bg);padding:3px 8px;border-radius:var(--r-full);letter-spacing:.5px;text-transform:uppercase}
    .tb-nav{display:flex;gap:2px;margin-right:auto}
    .tb-tab{padding:7px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border:none;background:none;font-family:inherit;transition:all .15s}
    .tb-tab:hover{color:var(--t1);background:var(--card-2)}
    .tb-tab.active{color:var(--t0);background:var(--card-2);font-weight:600}
    .tb-right{display:flex;align-items:center;gap:12px}
    .tb-live{display:flex;align-items:center;gap:6px}
    .tb-dot{width:6px;height:6px;background:var(--pos);border-radius:50%;animation:pulse 2.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .tb-time{font-size:11px;color:var(--t3)}
    .tb-btn{background:var(--card);color:var(--t1);border:1px solid var(--border);padding:6px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
    .tb-btn:hover{background:var(--card-2);border-color:var(--border-2)}
    .tb-btn:disabled{opacity:.4;cursor:not-allowed}
    .tb-btn-accent{background:var(--accent);border-color:var(--accent);color:#fff}
    .tb-btn-accent:hover{background:#4F46E5}

    .content{max-width:1280px;margin:0 auto;padding:24px 24px 64px}
    .section{margin-bottom:20px}
    .section-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}

    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .35s ease-out both}
    .d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}.d4{animation-delay:.16s}.d5{animation-delay:.2s}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden;transition:box-shadow .2s,border-color .2s}
    .kpi:hover{box-shadow:var(--shadow-md);border-color:var(--border-2)}
    .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
    .kpi.total::before{background:linear-gradient(90deg,var(--accent),#A78BFA)}
    .kpi.c-pos::before{background:var(--pos)}
    .kpi.c-neg::before{background:var(--neg)}
    .kpi.c-news::before{background:#3B82F6}
    .kpi.c-reddit::before{background:#F97316}
    .kpi-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .kpi-val{font-size:34px;font-weight:800;line-height:1;letter-spacing:-.5px;color:var(--t0)}
    .kpi-foot{display:flex;align-items:center;gap:6px;margin-top:8px}
    .kpi-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--r-full)}
    .kpi-tag.pos{background:var(--pos-bg);color:var(--pos)}
    .kpi-tag.neg{background:var(--neg-bg);color:var(--neg)}
    .kpi-sub{font-size:11px;color:var(--t3)}
    .kpi-bar{height:3px;background:var(--card-2);border-radius:3px;margin-top:10px;overflow:hidden}
    .kpi-bar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}

    /* CHARTS */
    .charts-grid{display:grid;grid-template-columns:1fr 300px;gap:12px}
    .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);transition:box-shadow .2s}
    .panel:hover{box-shadow:var(--shadow)}
    .panel-head{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between}
    .panel-title{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
    .panel-body{padding:14px 20px 18px}
    .chart-h{height:200px}
    .donut-h{height:200px;display:flex;align-items:center;justify-content:center}

    /* SOURCES */
    .sources-strip{display:flex;gap:8px;flex-wrap:wrap}
    .source-chip{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 14px;transition:all .15s}
    .source-chip:hover{border-color:var(--border-2);box-shadow:var(--shadow)}
    .source-dot{width:7px;height:7px;border-radius:50%}
    .source-dot.on{box-shadow:0 0 6px currentColor}
    .source-name{font-size:12px;font-weight:500;color:var(--t1)}
    .source-count{font-size:12px;font-weight:700;color:var(--t0);background:var(--card-2);padding:2px 8px;border-radius:var(--r-full);min-width:24px;text-align:center}
    .source-chip a{font-size:11px;color:var(--accent);text-decoration:none;font-weight:600}
    .source-chip a:hover{text-decoration:underline}

    /* KEYWORDS */
    .kw-pill{padding:5px 14px;border-radius:var(--r-full);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--t2);transition:all .15s;background:var(--card)}
    .kw-pill:hover{border-color:var(--border-2);color:var(--t1)}
    .kw-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

    /* TABLE */
    .table-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .table-toolbar{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .tf{border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 11px;font-size:12px;font-family:inherit;color:var(--t1);background:var(--card);transition:border-color .15s}
    .tf:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
    .tf-search{flex:1;min-width:180px}
    .tf-count{margin-left:auto;font-size:11px;color:var(--t3)}

    .mention-row{display:grid;grid-template-columns:40px 66px 1fr 88px 76px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);transition:background .1s}
    .mention-row:last-child{border-bottom:none}
    .mention-row:hover{background:var(--card-2)}
    .mr-icon{width:32px;height:32px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:13px}
    .mr-icon.news{background:#EFF6FF;color:#3B82F6}
    .mr-icon.alerts{background:#F0FDF4;color:var(--pos)}
    .mr-icon.reddit{background:#FFF7ED;color:#F97316}
    .mr-icon.social{background:#FAF5FF;color:#8B5CF6}
    .mr-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 7px;border-radius:4px;text-align:center}
    .mr-type.news{background:#EFF6FF;color:#2563EB}
    .mr-type.alerts{background:#F0FDF4;color:#059669}
    .mr-type.reddit{background:#FFF7ED;color:#EA580C}
    .mr-type.social{background:#FAF5FF;color:#7C3AED}
    .mr-body{padding:0 14px;min-width:0}
    .mr-title{font-size:13px;font-weight:500;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
    .mr-title a{color:inherit;text-decoration:none;transition:color .1s}
    .mr-title a:hover{color:var(--accent)}
    .mr-meta{font-size:11px;color:var(--t3);margin-top:1px;display:flex;align-items:center;gap:5px}
    .mr-sep{width:3px;height:3px;background:var(--border-2);border-radius:50%}
    .mr-sent{text-align:center}
    .mr-badge{display:inline-block;padding:3px 10px;border-radius:var(--r-full);font-size:10px;font-weight:600;letter-spacing:.2px}
    .mr-badge.positive{background:var(--pos-bg);color:var(--pos);border:1px solid var(--pos-border)}
    .mr-badge.neutral{background:var(--neu-bg);color:var(--neu);border:1px solid var(--neu-border)}
    .mr-badge.negative{background:var(--neg-bg);color:var(--neg);border:1px solid var(--neg-border)}
    .mr-date{font-size:11px;color:var(--t3);text-align:right}

    .loading-state{display:flex;flex-direction:column;align-items:center;padding:56px;gap:12px}
    .spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-size:12px;color:var(--t3)}
    .empty-state{text-align:center;padding:48px;color:var(--t3);font-size:13px}

    @media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.charts-grid{grid-template-columns:1fr}}
    @media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.mention-row{grid-template-columns:40px 1fr 80px}.mr-type,.mr-date{display:none}.content{padding:16px}}
  </style>
</head>
<body>

<header class="topbar">
  <div class="tb-logo">
    <div class="tb-logo-icon">SRI</div>
    <span class="tb-logo-text">Brand Monitor</span>
  </div>
  <span class="tb-badge">Internal</span>
  <nav class="tb-nav">
    <button class="tb-tab active">Overview</button>
    <button class="tb-tab" onclick="document.getElementById('mentions-section').scrollIntoView({behavior:'smooth'})">Mentions</button>
  </nav>
  <div class="tb-right">
    <div class="tb-live"><div class="tb-dot"></div><span class="tb-time">Live</span></div>
    <span class="tb-time" id="lastUpdated"></span>
    <button class="tb-btn" onclick="exportCsv()">Export</button>
    <button class="tb-btn tb-btn-accent" id="refreshBtn" onclick="loadAll()">Refresh</button>
  </div>
</header>

<div class="content">

  <div class="section">
    <div class="kpi-grid">
      <div class="kpi total fade-up"><div class="kpi-label">Total Mentions</div><div class="kpi-val" id="kTotal">-</div><div class="kpi-foot"><span class="kpi-sub">across all sources</span></div></div>
      <div class="kpi c-pos fade-up d1"><div class="kpi-label">Positive</div><div class="kpi-val" id="kPos" style="color:var(--pos)">-</div><div class="kpi-foot"><span class="kpi-tag pos" id="kPosP">-</span><span class="kpi-sub">of total</span></div><div class="kpi-bar"><div class="kpi-bar-fill" id="kPosBar" style="background:var(--pos);width:0%"></div></div></div>
      <div class="kpi c-neg fade-up d2"><div class="kpi-label">Negative</div><div class="kpi-val" id="kNeg" style="color:var(--neg)">-</div><div class="kpi-foot"><span class="kpi-tag neg" id="kNegP">-</span><span class="kpi-sub">of total</span></div><div class="kpi-bar"><div class="kpi-bar-fill" id="kNegBar" style="background:var(--neg);width:0%"></div></div></div>
      <div class="kpi c-news fade-up d3"><div class="kpi-label">News</div><div class="kpi-val" id="kNews" style="color:#3B82F6">-</div><div class="kpi-foot"><span class="kpi-sub">Google News + API</span></div></div>
      <div class="kpi c-reddit fade-up d4"><div class="kpi-label">Reddit</div><div class="kpi-val" id="kReddit" style="color:#F97316">-</div><div class="kpi-foot"><span class="kpi-sub">Brand discussions</span></div></div>
    </div>
  </div>

  <div class="section">
    <div class="charts-grid">
      <div class="panel fade-up d1"><div class="panel-head"><span class="panel-title">Mention Volume &mdash; 14 Days</span></div><div class="panel-body"><div class="chart-h"><canvas id="timelineChart"></canvas></div></div></div>
      <div class="panel fade-up d2"><div class="panel-head"><span class="panel-title">Sentiment</span></div><div class="panel-body"><div class="donut-h"><canvas id="sentimentChart"></canvas></div></div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Sources</div>
    <div class="sources-strip" id="sourcesStrip"></div>
  </div>

  <div class="section">
    <div class="section-label">Keywords</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap" id="kwPills"></div>
  </div>

  <div class="section" id="mentions-section">
    <div class="table-panel">
      <div class="table-toolbar">
        <select class="tf" id="filterSource" onchange="applyFilters()">
          <option value="all">All Sources</option><option value="news">News</option><option value="alerts">Alerts</option><option value="reddit">Reddit</option><option value="social">Social</option>
        </select>
        <select class="tf" id="filterSentiment" onchange="applyFilters()">
          <option value="all">All Sentiment</option><option value="positive">Positive</option><option value="neutral">Neutral</option><option value="negative">Negative</option>
        </select>
        <select class="tf" id="filterSort" onchange="applyFilters()">
          <option value="date">Newest</option><option value="sentiment">Sentiment</option>
        </select>
        <input class="tf tf-search" type="text" id="searchInput" placeholder="Search mentions..." oninput="applyFilters()" />
        <span class="tf-count" id="mentionCount"></span>
      </div>
      <div id="feedContainer"><div class="loading-state"><div class="spinner"></div><span class="loading-text">Scanning sources...</span></div></div>
    </div>
  </div>

</div>

<script>
Chart.defaults.color='#94A3B8';
Chart.defaults.borderColor='#E2E8F0';
Chart.defaults.font.family='Inter';

let allMentions=[],timelineChart=null,sentimentChart=null,activeKeyword=null;

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function timeAgo(ds){const d=Date.now()-new Date(ds).getTime();if(isNaN(d))return'';const m=Math.floor(d/6e4);if(m<1)return'now';if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d'}
function fmtNum(n){if(n==null)return'-';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n)}

async function loadConfig(){
  try{
    const cfg=await fetch('/api/config').then(r=>r.json());
    const c=document.getElementById('kwPills');
    cfg.keywords.forEach(kw=>{
      const el=document.createElement('span');
      el.className='kw-pill';el.textContent=kw;
      el.onclick=()=>{
        if(activeKeyword===kw){activeKeyword=null;document.querySelectorAll('.kw-pill').forEach(t=>t.classList.remove('active'))}
        else{activeKeyword=kw;document.querySelectorAll('.kw-pill').forEach(t=>t.classList.remove('active'));el.classList.add('active')}
        applyFilters();
      };
      c.appendChild(el);
    });
  }catch(_){}
}

async function loadAll(){
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true;btn.textContent='Loading...';
  document.getElementById('feedContainer').innerHTML='<div class="loading-state"><div class="spinner"></div><span class="loading-text">Scanning sources...</span></div>';
  try{
    const[newsData,alertsData,redditData,bingData,googleData,igMentions,fbData]=await Promise.all([
      fetch('/api/news').then(r=>r.json()).catch(()=>[]),
      fetch('/api/alerts').then(r=>r.json()).catch(()=>[]),
      fetch('/api/reddit').then(r=>r.json()).catch(()=>[]),
      fetch('/api/bing').then(r=>r.json()).catch(()=>[]),
      fetch('/api/google').then(r=>r.json()).catch(()=>[]),
      fetch('/api/instagram/mentions').then(r=>r.json()).catch(()=>[]),
      fetch('/api/facebook').then(r=>r.json()).catch(()=>({status:'pending'})),
    ]);
    const fbItems=[...((fbData.posts||[]).map(p=>({...p,type:'social',platform:'facebook'}))),...((fbData.mentions||[]).map(m=>({...m,type:'social',platform:'facebook'})))];
    const seen=new Set();
    allMentions=[...(newsData||[]),...(alertsData||[]),...(redditData||[]),...(bingData||[]),...(googleData||[]),...(igMentions||[]),...fbItems]
      .filter(m=>{if(!m.title)return false;const k=m.title.slice(0,80).toLowerCase();if(seen.has(k))return false;seen.add(k);return true})
      .sort((a,b)=>new Date(b.date)-new Date(a.date));
    updateKpis();updateCharts();updateSources(newsData,alertsData,redditData,googleData,igMentions,fbData);applyFilters();
    document.getElementById('lastUpdated').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }catch(err){console.error(err);document.getElementById('feedContainer').innerHTML='<div class="empty-state">Could not load data.</div>'}
  finally{btn.disabled=false;btn.textContent='Refresh'}
}

function updateKpis(){
  const t=allMentions.length,p=allMentions.filter(m=>m.sentiment==='positive').length,n=allMentions.filter(m=>m.sentiment==='negative').length;
  const news=allMentions.filter(m=>m.type==='news').length,reddit=allMentions.filter(m=>m.type==='reddit').length;
  const pct=v=>t?Math.round(v/t*100)+'%':'-';
  document.getElementById('kTotal').textContent=t;
  document.getElementById('kPos').textContent=p;document.getElementById('kPosP').textContent=pct(p);document.getElementById('kPosBar').style.width=t?Math.round(p/t*100)+'%':'0%';
  document.getElementById('kNeg').textContent=n;document.getElementById('kNegP').textContent=pct(n);document.getElementById('kNegBar').style.width=t?Math.round(n/t*100)+'%':'0%';
  document.getElementById('kNews').textContent=news;document.getElementById('kReddit').textContent=reddit;
}

function updateCharts(){
  const DAYS=14,labels=[],posD=[],neuD=[],negD=[];
  for(let i=DAYS-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const key=d.toISOString().slice(0,10);labels.push(d.toLocaleDateString([],{month:'short',day:'numeric'}));const day=allMentions.filter(m=>m.date&&m.date.startsWith(key));posD.push(day.filter(m=>m.sentiment==='positive').length);neuD.push(day.filter(m=>m.sentiment==='neutral').length);negD.push(day.filter(m=>m.sentiment==='negative').length)}
  if(timelineChart)timelineChart.destroy();
  timelineChart=new Chart(document.getElementById('timelineChart'),{
    type:'bar',data:{labels,datasets:[
      {label:'Positive',data:posD,backgroundColor:'rgba(5,150,105,.65)',borderRadius:3,barPercentage:.6},
      {label:'Neutral',data:neuD,backgroundColor:'rgba(217,119,6,.45)',borderRadius:3,barPercentage:.6},
      {label:'Negative',data:negD,backgroundColor:'rgba(220,38,38,.5)',borderRadius:3,barPercentage:.6},
    ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index'},
      scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:10}}},y:{stacked:true,beginAtZero:true,ticks:{stepSize:1,font:{size:10}},grid:{color:'#F1F5F9'}}},
      plugins:{legend:{position:'top',labels:{boxWidth:8,padding:16,font:{size:11},usePointStyle:true,pointStyle:'circle'}}}
    }
  });
  const p=allMentions.filter(m=>m.sentiment==='positive').length,ne=allMentions.filter(m=>m.sentiment==='neutral').length,ng=allMentions.filter(m=>m.sentiment==='negative').length;
  if(sentimentChart)sentimentChart.destroy();
  sentimentChart=new Chart(document.getElementById('sentimentChart'),{
    type:'doughnut',data:{labels:['Positive','Neutral','Negative'],datasets:[{data:[p,ne,ng],backgroundColor:['#059669','#D97706','#DC2626'],borderWidth:0,hoverOffset:6,borderRadius:3}]},
    options:{cutout:'74%',plugins:{legend:{position:'bottom',labels:{boxWidth:8,padding:14,font:{size:11},usePointStyle:true,pointStyle:'circle'}}}}
  });
}

function updateSources(news,alerts,reddit,google,ig,fb){
  const strip=document.getElementById('sourcesStrip');
  const items=[
    {name:'Google News',count:(google||[]).length,color:'#3B82F6',on:(google||[]).length>0},
    {name:'News API',count:(news||[]).length,color:'#6366F1',on:(news||[]).length>0},
    {name:'Google Alerts',count:(alerts||[]).length,color:'#059669',on:true},
    {name:'Reddit',count:(reddit||[]).length,color:'#F97316',on:(reddit||[]).length>0},
    {name:'Instagram',color:'#EC4899',on:false,link:true},
    {name:'Facebook',color:'#3B82F6',on:false,link:true},
  ];
  fetch('/api/instagram').then(r=>r.json()).then(d=>{if(d.status==='connected'){items[4].on=true;items[4].sub='@'+d.handle;render()}}).catch(()=>{});
  fetch('/api/facebook').then(r=>r.json()).then(d=>{if(d.status==='connected'){items[5].on=true;items[5].sub=d.page?.name;render()}}).catch(()=>{});
  function render(){
    strip.innerHTML=items.map(s=>`<div class="source-chip">
      <div class="source-dot ${s.on?'on':''}" style="color:${s.color};background:${s.on?s.color:'#CBD5E1'}"></div>
      <span class="source-name">${esc(s.name)}${s.sub?' <span style="color:var(--t3);font-size:11px">'+esc(s.sub)+'</span>':''}</span>
      ${s.count!=null?'<span class="source-count">'+s.count+'</span>':''}
      ${!s.on&&s.link?'<a href="/auth/meta">Connect</a>':''}
    </div>`).join('');
  }
  render();
}

function applyFilters(){
  const src=document.getElementById('filterSource').value,sent=document.getElementById('filterSentiment').value,sort=document.getElementById('filterSort').value,q=document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered=allMentions.filter(m=>{
    if(src!=='all'&&m.type!==src)return false;if(sent!=='all'&&m.sentiment!==sent)return false;
    if(q&&!((m.title||'').toLowerCase().includes(q)||(m.description||'').toLowerCase().includes(q)))return false;
    if(activeKeyword){const kw=activeKeyword.toLowerCase();if(!((m.title||'').toLowerCase().includes(kw)||(m.description||'').toLowerCase().includes(kw)))return false}
    return true;
  });
  if(sort==='sentiment'){const o={negative:0,neutral:1,positive:2};filtered=filtered.slice().sort((a,b)=>(o[a.sentiment]||1)-(o[b.sentiment]||1))}
  document.getElementById('mentionCount').textContent=filtered.length+' mention'+(filtered.length!==1?'s':'');
  const c=document.getElementById('feedContainer');
  if(!allMentions.length){c.innerHTML='<div class="loading-state"><div class="spinner"></div><span class="loading-text">Loading...</span></div>';return}
  if(!filtered.length){c.innerHTML='<div class="empty-state">No mentions match your filters.</div>';return}
  c.innerHTML=filtered.map(m=>{
    const icons={news:'&#9889;',alerts:'&#9883;',reddit:'&#9673;',social:'&#10022;'};
    const typeLabel=m.type==='reddit'?'Reddit':m.type==='social'?(m.platform==='facebook'?'Facebook':'Instagram'):m.type==='news'?'News':'Alert';
    return`<div class="mention-row">
      <div class="mr-icon ${esc(m.type)}">${icons[m.type]||'&#9679;'}</div>
      <div><span class="mr-type ${esc(m.type)}">${typeLabel}</span></div>
      <div class="mr-body"><div class="mr-title">${m.url?'<a href="'+esc(m.url)+'" target="_blank" rel="noopener">'+esc(m.title)+'</a>':esc(m.title)}</div><div class="mr-meta"><span>${esc(m.sourceName||'')}</span>${m.date?'<span class="mr-sep"></span><span>'+timeAgo(m.date)+' ago</span>':''}</div></div>
      <div class="mr-sent"><span class="mr-badge ${esc(m.sentiment)}">${m.sentiment}</span></div>
      <div class="mr-date">${m.date?new Date(m.date).toLocaleDateString([],{month:'short',day:'numeric'}):''}</div>
    </div>`;
  }).join('');
}

function exportCsv(){
  const h=['Date','Type','Source','Title','Sentiment','URL'];
  const rows=allMentions.map(m=>[m.date?new Date(m.date).toISOString():'',m.type||'',m.sourceName||'','"'+(m.title||'').replace(/"/g,'""')+'"',m.sentiment||'',m.url||'']);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([[h,...rows].map(r=>r.join(',')).join('\n')],{type:'text/csv'}));
  a.download='sri-labs-mentions-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

(function(){
  const p=new URLSearchParams(location.search);
  const toast=(msg,bg)=>{const t=document.createElement('div');t.style.cssText='position:fixed;top:68px;left:50%;transform:translateX(-50%);background:'+bg+';color:#fff;padding:10px 24px;border-radius:10px;font-weight:600;font-size:13px;z-index:999;font-family:Inter,sans-serif;box-shadow:var(--shadow-md)';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3500)};
  if(p.get('meta_connected')||p.get('ig_connected')){toast('Connected successfully','#059669');history.replaceState({},'','/')}
  if(p.get('meta_error')||p.get('ig_error')){toast('Error: '+decodeURIComponent(p.get('meta_error')||p.get('ig_error')),'#DC2626');history.replaceState({},'','/')}
})();

setInterval(loadAll,10*60*1000);
loadConfig();loadAll();
</script>
