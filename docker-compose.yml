version: "3.8"

services:
  dashboard:
    build: .
    ports:
      - "80:3000"
    env_file:
      - .env
    volumes:
      - ./meta_tokens.json:/app/meta_tokens.json
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/config"]
      interval: 30s
      timeout: 5s
      retries: 3
